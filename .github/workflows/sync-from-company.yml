name: Sync from company repo

on:
  schedule:
    # Every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync from lxsWestar/claude-skills
        run: |
          git remote add company https://github.com/lxsWestar/claude-skills.git
          git fetch company master
          git merge company/master --allow-unrelated-histories -m "sync: merge from lxsWestar/claude-skills"
          git push origin master
