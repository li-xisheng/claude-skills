name: Sync from company repo

on:
  schedule:
    # Weekly, Monday 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync files from lxsWestar/claude-skills
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/company-claude-skills
          git clone --depth 1 https://github.com/lxsWestar/claude-skills.git /tmp/company-claude-skills

          # No --delete: this repo may hold skills that only exist here
          # (personal backup), so files absent from the company repo are
          # never removed — only added or updated.
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/workflows/' \
            /tmp/company-claude-skills/ ./

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          git commit -m "sync: copy files from lxsWestar/claude-skills"
          git push origin master
